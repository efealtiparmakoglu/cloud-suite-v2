apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cloud-suite-v2-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - host: cloud-suite-v2.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: cloud-suite-v2-service
            port:
              number: 80
